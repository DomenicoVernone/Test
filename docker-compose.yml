# File: docker-compose.yml
# Mappa generale dell'architettura "Clinical Twin".
# Definisce i microservizi, la rete interna isolata e il Volume Condiviso.

version: '3.8'

networks:
  clinical_network:
    driver: bridge
    name: clinical_twin_net

volumes:
  shared_clinical_data:
    name: clinical_twin_shared_data

services:
  # 1. API GATEWAY (FastAPI + SQLite)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinical_backend
    networks:
      - clinical_network
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - shared_clinical_data:/shared_data
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    # Il backend richiede che l'engine R sia in piedi per completare l'orchestrazione asincrona
    depends_on:
      - inference_engine
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # 2. INFERENCE ENGINE (Plumber + R)
  inference_engine:
    build:
      context: ./inference_engine
      dockerfile: Dockerfile
    container_name: inference_engine
    networks:
      - clinical_network
    ports:
      - "8001:8000"
    volumes:
      - ./inference_engine:/app # Hot-reload per R durante lo sviluppo locale
      - shared_clinical_data:/shared_data
    environment:
      # Passiamo la variabile in modo che api.R sappia dove leggere
      - SHARED_VOLUME_DIR=/shared_data

  # 3. DASHBOARD CLINICA (React + Vite)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinical_frontend
    networks:
      - clinical_network
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend