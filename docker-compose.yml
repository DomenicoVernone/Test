# Architettura "Clinical Twin" — Microservizi
# Versione: 2.0.0 (refactor microservices + DooD)

version: '3.8'

networks:
  clinical_network:
    driver: bridge
    name: clinical_twin_net

volumes:
  shared_clinical_data:
    name: clinical_twin_shared_data
  clinical_db_data:
    name: clinical_twin_db

services:

  # 1. API GATEWAY — Autenticazione e JWT
  api_gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
    container_name: clinical_api_gateway
    networks:
      - clinical_network
    ports:
      - "8000:8000"
    volumes:
      - ./api_gateway:/app
      - clinical_db_data:/shared_db
    env_file:
      - ./api_gateway/.env
    environment:
      - PYTHONUNBUFFERED=1

  # 2. ORCHESTRATOR — Pipeline asincrona e task management
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: clinical_orchestrator
    networks:
      - clinical_network
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./orchestrator:/app
      - clinical_db_data:/shared_db
      - shared_clinical_data:/shared_data
    env_file:
      - ./orchestrator/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api_gateway

  # 3. MODEL SERVICE — MLflow + trigger inferenza R
  model_service:
    build:
      context: ./model_service
      dockerfile: Dockerfile
    container_name: clinical_model_service
    networks:
      - clinical_network
    ports:
      - "127.0.0.1:8003:8000"
    volumes:
      - ./model_service:/app
      - shared_clinical_data:/shared_data
    env_file:
      - ./model_service/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - inference_engine

  # 4. LLM SERVICE — Assistente AI context-aware
  llm_service:
    build:
      context: ./llm_service
      dockerfile: Dockerfile
    container_name: clinical_llm_service
    networks:
      - clinical_network
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ./llm_service:/app
      - shared_clinical_data:/shared_data
    env_file:
      - ./llm_service/.env
    environment:
      - PYTHONUNBUFFERED=1

  # 5. INFERENCE ENGINE — Motore statistico R (Plumber)
  inference_engine:
    build:
      context: ./inference_engine
      dockerfile: Dockerfile
    container_name: inference_engine
    networks:
      - clinical_network
    ports:
      - "127.0.0.1:8004:8000"
    volumes:
      - ./inference_engine:/app
      - shared_clinical_data:/shared_data
      - ./nextflow_worker/data/external/ROI_labels.tsv:/app/roi_labels.tsv:ro
    environment:
      - SHARED_VOLUME_DIR=/shared_data
      - NF_LABELS=/app/roi_labels.tsv

  # 6. FRONTEND — Dashboard clinica React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinical_frontend
    networks:
      - clinical_network
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api_gateway
      - orchestrator
      - llm_service

  # 7. NEXTFLOW WORKER — Pipeline neuroimaging (DooD)
  # TODO: da implementare nella prossima sessione
  nextflow_worker:
    build:
      context: ./nextflow_worker
      dockerfile: Dockerfile
    container_name: nextflow_worker
    networks:
      - clinical_network
    ports:
      - "127.0.0.1:8005:8000"
    runtime: nvidia
    volumes:
      - ./nextflow_worker:/app
      - shared_clinical_data:/shared_data
      - /var/run/docker.sock:/var/run/docker.sock  # DooD
      - /tmp/nextflow_work:/tmp/nextflow_work

    environment:
      - SHARED_VOLUME_DIR=/shared_data
      - HOST_SHARED_VOLUME_DIR=${HOST_SHARED_VOLUME_DIR:-/shared_data}
      - NF_OUTDIR=${NF_OUTDIR:-/shared_data/nf_output}
      - NF_LABELS=${NF_LABELS:-/app/data/external/ROI_labels.tsv}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility