# Mappa generale dell'architettura "Clinical Twin".
# Definisce i microservizi, la rete interna isolata e il Volume Condiviso.

version: '3.8'

# Rete isolata per i microservizi del Clinical Twin
networks:
  clinical_network:
    driver: bridge # Rete bridge isolata per comunicazione interna tra i container
    name: clinical_twin_net

volumes: # Volume condiviso per dati clinici tra Backend, Inference Engine e Nextflow Worker
  shared_clinical_data:
    name: clinical_twin_shared_data
  clinical_db_data:
    name: clinical_twin_db

# Definizione dei servizi del Clinical Twin
services:
  api_gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
    container_name: clinical_api_gateway
    networks:
      - clinical_network
    ports:
      - "8000:8000"
    volumes:
      - ./api_gateway:/app
      - clinical_db_data:/shared_db
    env_file:
      - ./api_gateway/.env
    environment:
      - PYTHONUNBUFFERED=1

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: clinical_orchestrator
    networks:
      - clinical_network
    ports:
      - "8001:8000"
    volumes:
      - ./orchestrator:/app
      - clinical_db_data:/shared_db
      - shared_clinical_data:/shared_data
    env_file:
      - ./orchestrator/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api_gateway

  model_service:
    build:
      context: ./model_service
      dockerfile: Dockerfile
    container_name: clinical_model_service
    networks:
      - clinical_network
    ports:
      - "8003:8000"
    volumes:
      - ./model_service:/app
      - shared_clinical_data:/shared_data
    env_file:
      - ./model_service/.env
    environment:
      - PYTHONUNBUFFERED=1

  llm_service:
    build:
      context: ./llm_service
      dockerfile: Dockerfile
    container_name: clinical_llm_service
    networks:
      - clinical_network
    ports:
      - "8002:8000"
    volumes:
      - ./llm_service:/app
      - shared_clinical_data:/shared_data
    env_file:
      - ./llm_service/.env
    environment:
      - PYTHONUNBUFFERED=1
  # 1. API GATEWAY (FastAPI + SQLite)
  backend:
    build: # Costruisce l'immagine del backend usando il Dockerfile nella cartella ./backend
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinical_backend
    networks:
      - clinical_network
    ports: 
      - "8000:8000" 
    volumes:
      - ./backend:/app # Hot-reload per Python durante lo sviluppo locale
      - shared_clinical_data:/shared_data # Monta il volume condiviso per l'accesso ai dati clinici
    env_file: # Carica le variabili d'ambiente dal file .env nella cartella backend
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1 # Per log in tempo reale
    depends_on: # Assicura che il backend sia avviato prima dell'inference_engine
      - inference_engine
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload 

  # 2. INFERENCE ENGINE (Plumber + R)
  inference_engine:
    build:
      context: ./inference_engine
      dockerfile: Dockerfile
    container_name: inference_engine
    networks:
      - clinical_network
    # NOTA ARCHITETTURALE (SICUREZZA): 
    # Esposizione porta abilitata ESCLUSIVAMENTE per debug locale (accesso da Postman/Browser host).
    # In ambiente di produzione, rimuovere questa direttiva per isolare il motore di calcolo.
    # Il Backend vi accederà comunque in modo sicuro tramite DNS interno (http://inference_engine:8000).
    ports:
      - "8004:8000" 
    volumes:
      - ./inference_engine:/app # Hot-reload per R durante lo sviluppo locale
      - shared_clinical_data:/shared_data
    environment: 
      - SHARED_VOLUME_DIR=/shared_data

  # 3. DASHBOARD CLINICA (React + Vite)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinical_frontend
    networks:
      - clinical_network
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app # Hot-reload per React durante lo sviluppo locale
      - /app/node_modules  
    environment:
      - CHOKIDAR_USEPOLLING=true # Per hot-reload affidabile su Docker  
    depends_on:
      - backend

  # 4. DATA EXTRACTION TIER (Nextflow Orchestrator)
  nextflow_worker:
    build: 
      context: ./nextflow_worker
      dockerfile: Dockerfile
    container_name: nextflow_worker
    networks:
      - clinical_network
    ports:
      - "8002:8002"
    volumes: # Monta il codice del worker e il volume condiviso per l'accesso ai dati clinici
      - ./nextflow_worker:/app 
      - ./data:/app/data  
      - shared_clinical_data:/shared_data
