# File: docker-compose.yml
# Mappa generale dell'architettura "Clinical Twin".
# Definisce i microservizi, la rete interna isolata e il Volume Condiviso.

version: '3.8'

networks:
  clinical_network:
    driver: bridge # Rete isolata per i microservizi del Clinical Twin
    name: clinical_twin_net

volumes: # Volume condiviso per dati clinici tra backend e inference engine
  shared_clinical_data:
    name: clinical_twin_shared_data

services:
  # 1. API GATEWAY (FastAPI + SQLite)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinical_backend
    networks:
      - clinical_network
    ports:
      - "8000:8000" 
    volumes:
      - ./backend:/app # Hot-reload per Python durante lo sviluppo locale
      - shared_clinical_data:/shared_data
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1 # Per log in tempo reale
    # Il backend richiede che l'engine R sia in piedi per completare l'orchestrazione asincrona
    depends_on:
      - inference_engine
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload 

  # 2. INFERENCE ENGINE (Plumber + R)
  inference_engine:
    build:
      context: ./inference_engine
      dockerfile: Dockerfile
    container_name: inference_engine
    networks:
      - clinical_network
    # NOTA ARCHITETTURALE (SICUREZZA): 
    # Esposizione porta abilitata ESCLUSIVAMENTE per debug locale (accesso da Postman/Browser host).
    # In ambiente di produzione, rimuovere questa direttiva per isolare il motore di calcolo.
    # Il Backend vi accederà comunque in modo sicuro tramite DNS interno (http://inference_engine:8000).
    ports:
      - "8001:8000" 
    volumes:
      - ./inference_engine:/app # Hot-reload per R durante lo sviluppo locale
      - shared_clinical_data:/shared_data
    environment:
      # Passiamo la variabile in modo che api.R sappia dove leggere
      - SHARED_VOLUME_DIR=/shared_data

  # 3. DASHBOARD CLINICA (React + Vite)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinical_frontend
    networks:
      - clinical_network
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app # Hot-reload per React durante lo sviluppo locale
      - /app/node_modules  
    environment:
      - CHOKIDAR_USEPOLLING=true # Per hot-reload affidabile su Docker  
    depends_on:
      - backend

  # 4. DATA EXTRACTION TIER (Nextflow Orchestrator)
  nextflow_worker:
    build: 
      context: ./nextflow_worker
      dockerfile: Dockerfile
    container_name: nextflow_worker
    networks:
      - clinical_network
    ports:
      - "8002:8002"
    volumes:
      # 1. Montiamo i file del worker
      - ./nextflow_worker:/app 
      # 2. IL TAVOLO CONDIVISO: Così vede le risonanze salvate dal Backend
      - shared_clinical_data:/shared_data
      # 3. IL TRUCCO MAGICO: Permette a Nextflow di "parlare" col Docker del tuo PC per avviare FastSurfer
      - /var/run/docker.sock:/var/run/docker.sock