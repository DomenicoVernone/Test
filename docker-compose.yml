# Mappa generale della nostra architettura.
# Definisce i due container principali (Frontend e Backend), espone le porte di comunicazione
# e crea il Volume Condiviso (shared_clinical_data), essenziale per passare i file medici pesanti 
# in modo asincrono senza bloccare la rete.

version: '3.8'

services:
  # 1. API GATEWAY (FastAPI + SQLite)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinical_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - shared_clinical_data:/shared_data
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # 2. DASHBOARD CLINICA (React + Vite)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinical_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
    shared_clinical_data: