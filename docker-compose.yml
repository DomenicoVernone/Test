version: '3.8'

services:
  # ... (Qui sopra metti i tuoi servizi backend e R se li avevi già scritti) ...

  # Aggiungiamo il servizio Frontend
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinical_frontend
    ports:
      - "5173:5173"
    volumes:
      # Collega la cartella locale al container per l'hot reload
      - ./frontend:/app
      # Protegge i moduli node installati nel container
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true