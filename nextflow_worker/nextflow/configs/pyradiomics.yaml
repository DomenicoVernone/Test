# PyRadiomics configuration file
# Ottimizzato per pipeline Clinical Twin (MRI T1 + FreeSurfer ROI)

setting:

  # ===============================
  # INTENSITY NORMALIZATION
  # ===============================

  normalize: true
  normalizeScale: 100
  removeOutliers: 3


  # ===============================
  # DISCRETIZATION (CRITICAL)
  # ===============================

  binWidth: 25


  # ===============================
  # RESAMPLING (VOXEL SIZE STANDARDIZATION)
  # ===============================

  resampledPixelSpacing:
    - 1
    - 1
    - 1

  interpolator: sitkBSpline


  # ===============================
  # SHIFT NEGATIVE VALUES AFTER NORMALIZATION
  # ===============================

  voxelArrayShift: 300


  # ===============================
  # LABEL VALUE INSIDE ROI MASK
  # ===============================

  label: 1


# ===============================
# IMAGE TYPES
# ===============================

imageType:

  Original: {}

  LoG:

    sigma:
      - 1.0
      - 2.0
      - 3.0


# ===============================
# FEATURE CLASSES
# ===============================

featureClass:

  shape:

  firstorder:

  glcm:

  glrlm:

  glszm:

  gldm: