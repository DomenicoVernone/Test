site_name: MLOps – FTD Radiomics Pipeline Documentation

theme:
  name: material
  language: en  # Lingua predefinita per l'interfaccia (Inglese)
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - content.code.copy

plugins:
  - search
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: it
          name: Italiano
          build: true
      add_selector: true
      fallback_to_default: true


nav:
  - Introduction: index.md
  - Architecture:
      - MLOps Architecture: Architettura.md
      - Microservices Overview: Microservizi.md
      - Project Structure: Struttura_del_Progetto.md
  - Environment Setup:
      - Installation: Installazione.md
      - Configuration: Configurazione.md
  - Radiomic Feature Extraction Pipeline: Pipeline_docs.md
  - Quick Guide: Guida_Rapida.md
  - API Reference: api.md
  - Deployment: Deployment.md
  - Testing: testing.md