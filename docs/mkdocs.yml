site_name: MLOps – FTD Radiomics Pipeline Documentation

theme:
  name: material
  language: en
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - content.code.copy

plugins:
  - search
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: it
          name: Italiano
          build: true
      add_selector: true
      fallback_to_default: true

nav:
  - Introduction: index.md

  - Architecture:
      - System Architecture: SYSTEM_ARCHITECTURE.md
      - Components & Structure: COMPONENTS_&_STRUCTURE.md

  - Setup:
      - Installation: Installazione.md
      - Configuration: Configurazione.md

  - Pipeline:
      - Radiomics Pipeline: Pipeline_doc.md

  - Usage:
      - Quickstart: Guida_Rapida.md

  - API:
      - API Reference: api.md

  - Deployment:
      - Deployment Guide: Deployment.md

  - Testing:
      - Test Plan: testing.md